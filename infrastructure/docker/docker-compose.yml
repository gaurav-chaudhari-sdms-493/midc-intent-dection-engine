services:

  postgres:
    image: postgres:16

    container_name: midc-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - midc-network

  backend:
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile

    container_name: midc-backend

    env_file:
      - ../../.env

    environment:
      DB_HOST: postgres

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "8000:8000"

    networks:
      - midc-network

volumes:
  postgres_data:

networks:
  midc-network:
    driver: bridge
