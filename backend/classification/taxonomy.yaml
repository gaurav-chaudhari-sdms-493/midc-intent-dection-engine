# Defines the classification taxonomy for incoming investor inquiries.
# This file serves as the single source of truth for all classification categories
# that will be used by the classifier, router, and other downstream modules.

# The primary reason or goal of the investor's inquiry.
primary_intents:
  - new_investment_proposal    # For setting up a new project or unit.
  - land_allotment             # For acquiring or leasing land from MIDC.
  - policy_incentive_query     # For questions about government policies, subsidies, etc.
  - application_status         # For checking the status of a submitted application.
  - complaint_grievance        # For raising a complaint or issue.
  - general_faq                # For general, non-specific questions.

# The industrial sector the inquiry relates to.
industries:
  - it_ites_software           # IT, IT-Enabled Services, and Software
  - auto_components_ev         # Automotive, Auto Components, and Electric Vehicles
  - pharma_biotech             # Pharmaceuticals and Biotechnology
  - chemicals_petrochemicals   # Chemicals and Petrochemicals
  - renewable_energy           # Solar, Wind, Green Hydrogen, etc.
  - other                      # Any industry not in the pilot list.

# The urgency or importance assigned to the inquiry for routing and SLA purposes.
priority_bands:
  - high
  - medium
  - low

# The estimated size of the proposed investment, in Indian Rupees (Crore).
investment_size_bands:
  - "<10cr"
  - "10-100cr"
  - ">100cr"

# Supported languages for processing inquiries.
languages:
  - en  # English
  - hi  # Hindi
  - mr  # Marathi
